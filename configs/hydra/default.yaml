defaults:
  - override hydra_logging: colorlog
  - override job_logging: colorlog
  - override launcher: slurm


run:
  dir: ../models/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}

sweep:
  dir: ../models/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  subdir: ${hydra.job.override_dirname}

sweeper:  
  params:
    experiments: glob(*)

job_logging:
  handlers:
    file:
      # Incorporates fix from https://github.com/facebookresearch/hydra/pull/2242
      filename: ../models/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}/experiment.log
